name: Build VoiceClic.exe

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        shell: pwsh
        run: |
          $url = "https://www.autohotkey.com/download/ahk-v2.zip"
          Invoke-WebRequest -Uri $url -OutFile ahk.zip
          Expand-Archive -Path ahk.zip -DestinationPath ahk
          echo "AHK_DIR=$PWD\ahk" >> $env:GITHUB_ENV

      - name: Install Ahk2Exe
        shell: pwsh
        run: |
          $url = "https://github.com/AutoHotkey/Ahk2Exe/releases/latest/download/Ahk2Exe.zip"
          Invoke-WebRequest -Uri $url -OutFile ahk2exe.zip
          Expand-Archive -Path ahk2exe.zip -DestinationPath ahk2exe

      - name: Compile VoiceClic.exe
        shell: pwsh
        run: |
          & .\ahk2exe\Ahk2Exe.exe /in VoiceClic.ahk /out VoiceClic.exe /base "$env:AHK_DIR\AutoHotkey64.exe"
          if (-not (Test-Path VoiceClic.exe)) { throw "Compilation failed" }

      - uses: actions/upload-artifact@v4
        with:
          name: VoiceClic
          path: VoiceClic.exe

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: gh release create "${{ github.ref_name }}" VoiceClic.exe --generate-notes --title "VoiceClic ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
